name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- CI JOB: Build and Test ---
  build-and-test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify import
        run: |
          python -c "import os, sys; print(os.getcwd()); print(sys.path)"
          python -c "from app import app; print('OK')"

      - name: Run tests
        run: |
          pytest -v

  # --- CD JOB: Docker Build and Push ---
  build-and-push:
    needs: build-and-test  # This ensures Docker only builds if tests pass
    runs-on: ubuntu-latest
    # Only push to Docker Hub on actual pushes to main, not on Pull Requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: malijutt/sakilaappspring:latest
