name: Conditional Deployment Workflow

on:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'config.py'
      - 'templates/**'
      - 'static/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'docker-compose.yml'

env:
  IMAGE_NAME: sakila-app

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build staging image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:staging-${{ github.sha }} .

      - name: Run staging container
        run: |
          docker run -d \
            --name sakila-staging \
            -e MYSQL_HOST=localhost \
            -e MYSQL_USER=root \
            -e MYSQL_PASSWORD=admin \
            -e MYSQL_DB=sakila \
            -p 5000:5000 \
            ${{ env.IMAGE_NAME }}:staging-${{ github.sha }} || true

      - name: Print staging environment info
        run: |
          echo "===== STAGING DEPLOYMENT INFO ====="
          echo "Branch:     ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Actor:      ${{ github.actor }}"
          echo "Image Tag:  staging-${{ github.sha }}"
          echo "==================================="

      - name: Write GitHub Job Summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE_NAME }}:staging-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ✅ Deployed Successfully |" >> $GITHUB_STEP_SUMMARY

      - name: Notify staging deployment
        run: |
          echo "Slack notification: Deployment to staging successful - commit ${{ github.sha }} by ${{ github.actor }}"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set production version tag
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d')"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Production version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }} .
          docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Print production deployment info
        run: |
          echo "===== PRODUCTION DEPLOYMENT INFO ====="
          echo "Version:    ${{ steps.version.outputs.VERSION }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Actor:      ${{ github.actor }}"
          echo "Image Tag:  ${{ steps.version.outputs.VERSION }}"
          echo "======================================"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          release_name: "Release ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Release ${{ steps.version.outputs.VERSION }}

            ### Changes
            - Deployed commit: `${{ github.sha }}`
            - Deployed by: ${{ github.actor }}
            - Branch: `${{ github.ref_name }}`

            ### Docker Image
            - Image: `${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}`

            ### Deployment Status
            ✅ Successfully deployed to production
          draft: false
          prerelease: false

      - name: Notify production deployment
        run: |
          echo "Slack notification: Deployment to production successful - version ${{ steps.version.outputs.VERSION }} deployed by ${{ github.actor }}"
