name: Deployment Workflow

on:
  push:
    branches:
      - main
    paths:
      - app.py
      - config.py
      - templates/**
      - static/**
      - Dockerfile
      - requirements.txt
      - docker-compose.yml

permissions:
  contents: write

env:
  IMAGE_NAME: sakila-app

jobs:

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print staging environment details
        run: |
          echo "Environment: staging"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"
          echo "Repository: ${GITHUB_REPOSITORY}"

      - name: Build Docker image (staging)
        run: |
          docker build -t "${IMAGE_NAME}:staging-${GITHUB_SHA}" .
          docker images "${IMAGE_NAME}:staging-${GITHUB_SHA}"

      - name: Simulate staging deployment
        run: |
          docker run -d --name sakila-staging \
            -p 5000:5000 \
            -e MYSQL_HOST=dummy \
            -e MYSQL_USER=root \
            -e MYSQL_PASSWORD=admin \
            -e MYSQL_DB=sakila \
            "${IMAGE_NAME}:staging-${GITHUB_SHA}"

          docker ps --filter name=sakila-staging
          docker rm -f sakila-staging

      - name: Write staging deployment summary
        run: |
          {
            echo "## 🚀 Staging Deployment Summary"
            echo "- Status: Successful"
            echo "- Image: ${IMAGE_NAME}:staging-${GITHUB_SHA}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Triggered by: ${GITHUB_ACTOR}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Notify staging
       run: echo 'Slack notification: Deployment to staging successful'


  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production   # 🔴 triggers approval

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

     - name: Generate release tag
  id: tag
  run: |
    RELEASE_TAG=v$(date +'%Y.%m.%d')
    echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
    echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

      - name: Simulate production deployment
        run: |
          echo "Deploying to PRODUCTION..."
          echo "Commit: ${GITHUB_SHA}"

      - name: Write production deployment summary
        run: |
          {
            echo "## 🚀 Production Deployment Summary"
            echo "- Status: Successful"
            echo "- Release: $RELEASE_TAG"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Triggered by: ${GITHUB_ACTOR}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          generate_release_notes: true

      - name: Notify production
        run: echo 'Slack notification: Deployment to production successful'
