name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.9"
  IMAGE_NAME: sakila-app
  MYSQL_HOST: 127.0.0.1
  MYSQL_PORT: "3306"
  MYSQL_USER: root
  MYSQL_PASSWORD: admin
  MYSQL_DB: sakila

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8 autopep8

      - name: Auto-format Python files for CI lint baseline
        run: |
          autopep8 --in-place --aggressive --aggressive --recursive app.py config.py tests

      - name: Run flake8 checks
        run: |
          flake8 . --max-line-length=120 --ignore=E501,W503

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    env:
      PYTHONPATH: ${{ github.workspace }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: sakila
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies and mysql client
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL service to be healthy
        run: |
          for i in {1..60}; do
            if mysql -h "${MYSQL_HOST}" -P "${MYSQL_PORT}" -u"${MYSQL_USER}" -p"${MYSQL_PASSWORD}" -e "SELECT 1" >/dev/null 2>&1; then
              echo "MySQL is healthy."
              exit 0
            fi
            echo "Waiting for MySQL... attempt ${i}"
            sleep 3
          done
          echo "MySQL did not become healthy in time."
          exit 1

      - name: Ensure Sakila SQL files are available
        run: |
          mkdir -p sakila-db
          if [ ! -f sakila-db/sakila-schema.sql ] || [ ! -f sakila-db/sakila-data.sql ]; then
            echo "Sakila SQL files missing in repo checkout. Downloading official Sakila dataset..."
            curl -fsSL "https://downloads.mysql.com/docs/sakila-db.zip" -o /tmp/sakila-db.zip
            unzip -o /tmp/sakila-db.zip -d /tmp
            cp /tmp/sakila-db/sakila-schema.sql sakila-db/sakila-schema.sql
            cp /tmp/sakila-db/sakila-data.sql sakila-db/sakila-data.sql
          fi
          ls -la sakila-db

      - name: Import Sakila schema and data
        run: |
          mysql -h "${MYSQL_HOST}" -P "${MYSQL_PORT}" -u"${MYSQL_USER}" -p"${MYSQL_PASSWORD}" "${MYSQL_DB}" < sakila-db/sakila-schema.sql
          mysql -h "${MYSQL_HOST}" -P "${MYSQL_PORT}" -u"${MYSQL_USER}" -p"${MYSQL_PASSWORD}" "${MYSQL_DB}" < sakila-db/sakila-data.sql

      - name: Run pytest (verbose)
        env:
          MYSQL_HOST: ${{ env.MYSQL_HOST }}
          MYSQL_USER: ${{ env.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ env.MYSQL_PASSWORD }}
          MYSQL_DB: ${{ env.MYSQL_DB }}
        run: |
          pytest -v

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Verify image exists
        run: |
          docker images "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Smoke test container on port 5000
        env:
          MYSQL_HOST: dummy-host
          MYSQL_USER: root
          MYSQL_PASSWORD: admin
          MYSQL_DB: sakila
        run: |
          docker run -d --name sakila-smoke \
            -p 5000:5000 \
            -e MYSQL_HOST="${MYSQL_HOST}" \
            -e MYSQL_USER="${MYSQL_USER}" \
            -e MYSQL_PASSWORD="${MYSQL_PASSWORD}" \
            -e MYSQL_DB="${MYSQL_DB}" \
            "${IMAGE_NAME}:${GITHUB_SHA}"

          for i in {1..20}; do
            if curl -fsS "http://localhost:5000/" >/dev/null; then
              echo "Smoke test passed."
              docker rm -f sakila-smoke
              exit 0
            fi
            echo "Waiting for app startup... attempt ${i}"
            sleep 2
          done

          echo "Smoke test failed. Container logs:"
          docker logs sakila-smoke
          docker rm -f sakila-smoke
          exit 1

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scan
        run: |
          docker build -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          output: trivy-report.txt
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM,LOW"

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-report.txt
